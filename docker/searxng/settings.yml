use_default_settings: true

general:
  instance_name: "AI Assistant Search"
  debug: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "zh-CN"
  formats:
    - html
    - json

server:
  secret_key: "ai-assistant-searxng-key-2026"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false
  image_proxy: false

ui:
  static_use_hash: true
  default_locale: zh-Hans-CN

engines:
  # --- 国内可用引擎 ---
  - name: baidu
    engine: baidu
    shortcut: bd
    disabled: false

  - name: bing
    engine: bing
    shortcut: bi
    disabled: false
    # SearXNG bing 引擎配置: 使用 cn.bing.com
    base_url: "https://cn.bing.com"

  - name: bing_news
    engine: bing_news
    shortcut: bin
    disabled: false

  # --- 国外引擎（被墙，暂禁用）---
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: true

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: true

outgoing:
  request_timeout: 10.0
  max_request_timeout: 15.0
